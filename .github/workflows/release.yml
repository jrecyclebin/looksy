name: Build & Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target_os: linux
            target_arch: amd64
            cc: gcc
            label: linux-x64
          - os: ubuntu-latest
            target_os: linux
            target_arch: arm64
            cc: aarch64-linux-gnu-gcc
            label: linux-arm64
          - os: macos-14
            target_os: darwin
            target_arch: arm64
            cc: cc
            label: macos-arm64
          - os: windows-latest
            target_os: windows
            target_arch: amd64
            cc: "" # use V's bundled tcc on Windows x64
            label: windows-x64
          - os: windows-11-arm
            target_os: windows
            target_arch: arm64
            cc: clang
            label: windows-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install V
        uses: vlang/setup-v@v1
        with:
          check-latest: true

      - name: Install Linux arm64 cross-compiler
        if: matrix.target_os == 'linux' && matrix.target_arch == 'arm64'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install zip (Windows)
        if: matrix.target_os == 'windows'
        run: choco install zip -y
        shell: powershell

      - name: Build & package
        shell: bash
        run: bash scripts/build.sh
        env:
          OS: ${{ matrix.target_os }}
          ARCH: ${{ matrix.target_arch }}
          CC: ${{ matrix.cc }}
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: looksy-${{ github.ref_name }}-${{ matrix.label }}
          path: dist/looksy-${{ github.ref_name }}-${{ matrix.label }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
